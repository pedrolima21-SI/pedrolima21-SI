name: Update README Operations

on:
workflow_dispatch:

schedule:
- cron: "17 11 * * 1"

push:
branches:
- main
paths:
- "scripts/update-readme.py"
- ".github/workflows/update-readme.yml"

permissions:
contents: write

concurrency:
group: update-readme-operations
cancel-in-progress: true

jobs:
update-readme:
name: Update latest operations section
runs-on: ubuntu-latest

```
steps:
  - name: Checkout profile repository
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.12"

  - name: Update README latest operations
    env:
      GH_USERNAME: pedrolima-sec
      PROFILE_REPO: pedrolima-sec
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    run: python scripts/update-readme.py

  - name: Commit README changes
    run: |
      if git diff --quiet README.md; then
        echo "No README changes to commit."
        exit 0
      fi

      git config user.name "github-actions[bot]"
      git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      git add README.md
      git commit -m "update latest operations section"
      git push
```

