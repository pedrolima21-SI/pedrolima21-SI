```
.mono {
  font-family: "JetBrains Mono", "Consolas", monospace;
  letter-spacing: 1px;
}

.title {
  font-size: 20px;
  font-weight: 700;
  fill: #f59e0b;
}

.line {
  font-size: 14px;
  fill: #f8fafc;
  opacity: 0;
  animation: reveal 10s linear infinite;
}

.l1 { animation-delay: 0s; }
.l2 { animation-delay: 1.2s; }
.l3 { animation-delay: 2.4s; }
.l4 { animation-delay: 3.6s; }
.l5 { animation-delay: 4.8s; }
.l6 { animation-delay: 6s; }

.scan {
  animation: scan 4s linear infinite;
}

.blink {
  animation: blink 1.1s steps(2, start) infinite;
}

.dash {
  stroke: #f59e0b;
  stroke-width: 2;
  stroke-dasharray: 20 12;
  animation: dash 2s linear infinite;
}

@keyframes reveal {
  0%, 8% { opacity: 0; transform: translateX(-6px); }
  14%, 85% { opacity: 1; transform: translateX(0); }
  95%, 100% { opacity: 0; }
}

@keyframes blink {
  0%, 45% { opacity: 1; }
  46%, 100% { opacity: 0.2; }
}

@keyframes dash {
  to { stroke-dashoffset: -64; }
}

@keyframes scan {
  0% { transform: translateY(-220px); opacity: 0; }
  20% { opacity: 0.35; }
  80% { opacity: 0.35; }
  100% { transform: translateY(220px); opacity: 0; }
}
