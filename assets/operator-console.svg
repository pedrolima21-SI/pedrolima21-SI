.mono {
  font-family: "JetBrains Mono", "Consolas", monospace;
  letter-spacing: 1px;
}

.title {
  font-size: 18px;
  font-weight: 700;
  fill: #f59e0b;
}

.small {
  font-size: 12px;
  fill: #94a3b8;
}

.cmd {
  font-size: 14px;
  fill: #f8fafc;
  opacity: 0;
  animation: reveal 12s linear infinite;
}

.cmd1 { animation-delay: 0s; }
.cmd2 { animation-delay: 1.5s; }
.cmd3 { animation-delay: 3s; }
.cmd4 { animation-delay: 4.5s; }
.cmd5 { animation-delay: 6s; }
.cmd6 { animation-delay: 7.5s; }

.cursor {
  animation: blink 1s steps(2, start) infinite;
}

.scan {
  animation: scan 5s linear infinite;
}

.pulse {
  animation: pulse 2s ease-in-out infinite;
}

.bar1 {
  transform-origin: 760px 116px;
  animation: grow1 4s ease-in-out infinite;
}

.bar2 {
  transform-origin: 760px 156px;
  animation: grow2 5s ease-in-out infinite;
}

.bar3 {
  transform-origin: 760px 196px;
  animation: grow3 6s ease-in-out infinite;
}

@keyframes reveal {
  0%, 8% { opacity: 0; transform: translateY(6px); }
  12%, 85% { opacity: 1; transform: translateY(0); }
  95%, 100% { opacity: 0; }
}

@keyframes blink {
  0%, 45% { opacity: 1; }
  46%, 100% { opacity: 0.15; }
}

@keyframes scan {
  0% { transform: translateY(-300px); opacity: 0; }
  20% { opacity: 0.35; }
  80% { opacity: 0.35; }
  100% { transform: translateY(300px); opacity: 0; }
}

@keyframes pulse {
  0%, 100% { opacity: 0.35; }
  50% { opacity: 1; }
}

@keyframes grow1 {
  0%, 100% { transform: scaleX(0.62); }
  50% { transform: scaleX(0.9); }
}

@keyframes grow2 {
  0%, 100% { transform: scaleX(0.48); }
  50% { transform: scaleX(0.78); }
}

@keyframes grow3 {
  0%, 100% { transform: scaleX(0.38); }
  50% { transform: scaleX(0.68); }
}
