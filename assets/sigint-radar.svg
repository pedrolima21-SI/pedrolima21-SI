```
.amber {
  stroke: #f59e0b;
  fill: none;
}

.red {
  stroke: #dc2626;
  fill: none;
}

.text-main {
  fill: #f8fafc;
  font-family: "JetBrains Mono", "Consolas", monospace;
  font-size: 34px;
  font-weight: 700;
  letter-spacing: 3px;
}

.text-sub {
  fill: #f59e0b;
  font-family: "JetBrains Mono", "Consolas", monospace;
  font-size: 14px;
  letter-spacing: 2px;
}

.text-muted {
  fill: #94a3b8;
  font-family: "JetBrains Mono", "Consolas", monospace;
  font-size: 12px;
  letter-spacing: 1px;
}

.pulse {
  animation: pulse 2.6s ease-in-out infinite;
  transform-origin: center;
}

.sweep {
  animation: rotate 4s linear infinite;
  transform-origin: 980px 130px;
}

.blink {
  animation: blink 1.2s steps(2, start) infinite;
}

.scan {
  animation: scan 4s linear infinite;
}

@keyframes rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

@keyframes pulse {
  0%, 100% { opacity: 0.35; }
  50% { opacity: 1; }
}

@keyframes blink {
  0%, 45% { opacity: 1; }
  46%, 100% { opacity: 0.15; }
}

@keyframes scan {
  0% { transform: translateY(-260px); opacity: 0; }
  20% { opacity: 0.45; }
  80% { opacity: 0.45; }
  100% { transform: translateY(260px); opacity: 0; }
}
