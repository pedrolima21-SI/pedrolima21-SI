.muted {
  stroke: #1f2937;
  stroke-width: 1;
}

.text {
  fill: #f59e0b;
  font-family: "JetBrains Mono", "Consolas", monospace;
  font-size: 12px;
  letter-spacing: 3px;
}

.blink {
  animation: blink 1.2s steps(2, start) infinite;
}

@keyframes dash {
  to { stroke-dashoffset: -60; }
}

@keyframes blink {
  0%, 45% { opacity: 1; }
  46%, 100% { opacity: 0.25; }
}
